events {
    worker_connections 1024;
}

http {
    # Redirect all HTTP to HTTPS — production
    server {
        listen 80;
        server_name api.radianceits.com;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # Redirect all HTTP to HTTPS — staging
    server {
        listen 80;
        server_name staging.api.radianceits.com;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # Production HTTPS
    server {
        listen 443 ssl;
        server_name api.radianceits.com;

        ssl_certificate /etc/letsencrypt/live/api.radianceits.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.radianceits.com/privkey.pem;

        location / {
            proxy_pass http://api:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # Staging HTTPS
    server {
        listen 443 ssl;
        server_name staging.api.radianceits.com;

        ssl_certificate /etc/letsencrypt/live/staging.api.radianceits.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/staging.api.radianceits.com/privkey.pem;

        location / {
            proxy_pass http://api:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}