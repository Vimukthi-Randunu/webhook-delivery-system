name: CI/CD Pipeline

on:
  push:
    branches: [phase-5]

env:
  DOCKER_IMAGE: vimukthirandunu/webhook-delivery-system

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: PYTHONPATH=. pytest tests

  build:
    needs: test
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.sha.outputs.sha }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get SHA tag
        id: sha
        run: echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ env.DOCKER_IMAGE }}:${{ steps.sha.outputs.sha }}

  deploy-staging:
    needs: build
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Deploy to staging
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/webhook-delivery-system
            git pull origin phase-5
            IMAGE_TAG=${{ needs.build.outputs.image_tag }} docker compose -f docker-compose.instance1.yml pull
            IMAGE_TAG=${{ needs.build.outputs.image_tag }} docker compose -f docker-compose.instance1.yml up -d
            sleep 10
            curl -f http://localhost:8000/health

  deploy-production:
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy to production
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/webhook-delivery-system
            IMAGE_TAG=${{ needs.build.outputs.image_tag }} docker compose -f docker-compose.instance1.yml pull
            IMAGE_TAG=${{ needs.build.outputs.image_tag }} docker compose -f docker-compose.instance1.yml up -d
            sleep 10
            curl -f http://localhost:8000/health