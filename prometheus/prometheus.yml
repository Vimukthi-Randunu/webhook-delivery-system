global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  - job_name: webhook-api
    static_configs:
      - targets: ['10.0.1.78:8000']
    metrics_path: /metrics

  - job_name: redis
    static_configs:
      - targets: ['10.0.1.78:9121']

  - job_name: node
    static_configs:
      - targets: ['10.0.1.78:9100']